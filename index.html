<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biriyani Dibe Official - AI Powered Live Map</title>
    
    <!-- CDNs -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Leaflet Map -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Global context theke config nawa
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

        window.fbSDK = { 
            auth, 
            db, 
            appId,
            signInAnonymously, 
            signInWithCustomToken, 
            onAuthStateChanged, 
            collection, 
            addDoc, 
            onSnapshot, 
            query, 
            doc, 
            deleteDoc 
        };
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&display=swap');
        
        body {
            font-family: 'Hind Siliguri', sans-serif;
            background-color: #080808;
            color: white;
            margin: 0;
            overflow: hidden;
        }

        .mosjid-marker-pin {
            width: 44px; height: 44px; border-radius: 12px 12px 12px 2px;
            transform: rotate(-45deg); display: flex; align-items: center; justify-content: center;
            background: #10b981; border: 2px solid white; box-shadow: 0 4px 15px rgba(16,185,129,0.4);
        }
        .mosjid-marker-pin svg { transform: rotate(45deg); }
        
        .user-marker {
            width: 16px; height: 16px; background: #3b82f6; border: 3px solid white;
            border-radius: 50%; box-shadow: 0 0 15px #3b82f6;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.5); opacity: 0.5; }
            100% { transform: scale(1); opacity: 1; }
        }

        .leaflet-popup-content-wrapper { border-radius: 1.5rem; background: white; color: black; }
        .leaflet-container { background: #080808 !important; }
        
        .loading-screen {
            position: fixed; inset: 0; background: #080808; z-index: 100;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        /* AI Chat Bubble Styles */
        .chat-bubble {
            animation: slideIn 0.3s ease-out;
        }
        @keyframes slideIn {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const App = () => {
            const [user, setUser] = useState(null);
            const [activeSpots, setActiveSpots] = useState([]);
            const [isBottomSheetOpen, setIsBottomSheetOpen] = useState(false);
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [isAIChatOpen, setIsAIChatOpen] = useState(false);
            const [pickingLocation, setPickingLocation] = useState(false);
            const [isLoading, setIsLoading] = useState(true);
            const [isGenerating, setIsGenerating] = useState(false);
            const [searchQuery, setSearchQuery] = useState("");
            const [aiTip, setAiTip] = useState("✨ Ajker distribution-er tips pete ekhane click korun!");
            
            const [formData, setFormData] = useState({
                name: '', type: 'Biriyani', count: '', time: '18:00', description: '', lat: 23.8103, lng: 90.4125
            });

            const mapRef = useRef(null);
            const mapInstance = useRef(null);
            const markersRef = useRef([]);
            const userMarkerRef = useRef(null);

            // Gemini API Implementation with Exponential Backoff
            const callGemini = async (prompt) => {
                const apiKey = ""; // Execution environment provides this
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
                
                const fetchWithRetry = async (retries = 5, delay = 1000) => {
                    try {
                        const response = await fetch(url, {
                            method: "POST",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify({
                                contents: [{ parts: [{ text: prompt }] }],
                                systemInstruction: { parts: [{ text: "You are a helpful assistant for a charity food distribution app. Keep responses in Bangla (Latin) script. Be concise, polite, and community-focused." }] }
                            })
                        });
                        const result = await response.json();
                        return result.candidates?.[0]?.content?.parts?.[0]?.text;
                    } catch (error) {
                        if (retries > 0) {
                            await new Promise(res => setTimeout(res, delay));
                            return fetchWithRetry(retries - 1, delay * 2);
                        }
                        throw error;
                    }
                };

                return fetchWithRetry();
            };

            const generateAIDescription = async () => {
                if (!formData.name) return alert("Prothome masjid-er nam likhun!");
                setIsGenerating(true);
                const prompt = `Write a short, inviting 1-line description in Bangla (Latin script) for food distribution at "${formData.name}". They are giving "${formData.type}" for around "${formData.count}" people. Make it sound blessed and welcoming.`;
                
                try {
                    const desc = await callGemini(prompt);
                    setFormData(prev => ({ ...prev, description: desc }));
                } catch (error) {
                    alert("AI description generate kora jayni. Abbar chesta korun.");
                } finally {
                    setIsGenerating(false);
                }
            };

            const getSmartTip = async () => {
                setIsAIChatOpen(true);
                setAiTip("✨ AI chinta korche...");
                const prompt = "Give a quick tips in 2 lines for someone organizing an Iftar distribution. Use Bangla (Latin script). Focus on cleanliness and crowd management.";
                
                try {
                    const tip = await callGemini(prompt);
                    setAiTip(tip);
                } catch (error) {
                    setAiTip("✨ Tips load kora jayni. Pore chesta korun.");
                }
            };

            // Step 1: Handle Authentication
            useEffect(() => {
                const { auth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } = window.fbSDK;
                
                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await signInWithCustomToken(auth, __initial_auth_token);
                        } else {
                            await signInAnonymously(auth);
                        }
                    } catch (error) {
                        console.error("Auth error:", error);
                    }
                };
                
                initAuth();
                const unsubscribe = onAuthStateChanged(auth, setUser);
                return () => unsubscribe();
            }, []);

            // Step 2: Fetch Data after Auth
            useEffect(() => {
                if (!user) return;

                const { db, appId, collection, onSnapshot, query } = window.fbSDK;
                const spotsCollection = collection(db, 'artifacts', appId, 'public', 'data', 'spots');
                
                const q = query(spotsCollection);
                const unsubscribe = onSnapshot(q, (snapshot) => {
                    const spots = [];
                    const now = new Date();
                    const resetTime = new Date();
                    resetTime.setHours(19, 0, 0, 0);
                    if (now.getHours() < 19) resetTime.setDate(resetTime.getDate() - 1);

                    snapshot.forEach((doc) => {
                        const data = doc.data();
                        if (data.createdAt > resetTime.getTime()) {
                            spots.push({ id: doc.id, ...data });
                        }
                    });
                    setActiveSpots(spots);
                    setIsLoading(false);
                }, (error) => {
                    console.error("Firestore error:", error);
                    setIsLoading(false);
                });

                return () => unsubscribe();
            }, [user]);

            // Map Initialization
            useEffect(() => {
                if (isLoading || !mapRef.current || mapInstance.current) return;

                mapInstance.current = L.map(mapRef.current, {
                    zoomControl: false,
                    attributionControl: false
                }).setView([23.8103, 90.4125], 13);

                L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(mapInstance.current);

                mapInstance.current.locate({ setView: true, watch: true, maxZoom: 16 });

                mapInstance.current.on('locationfound', (e) => {
                    if (userMarkerRef.current) userMarkerRef.current.remove();
                    userMarkerRef.current = L.marker(e.latlng, {
                        icon: L.divIcon({ className: 'user-marker', iconSize: [16, 16] })
                    }).addTo(mapInstance.current).bindPopup("Apni ekhane achen");
                });

                mapInstance.current.on('move', () => {
                    if (pickingLocation) {
                        const center = mapInstance.current.getCenter();
                        setFormData(prev => ({ ...prev, lat: center.lat, lng: center.lng }));
                    }
                });
            }, [isLoading]);

            // Sync Markers
            useEffect(() => {
                if (!mapInstance.current) return;
                markersRef.current.forEach(m => m.remove());
                markersRef.current = [];

                activeSpots.forEach(spot => {
                    const marker = L.marker([spot.lat, spot.lng], {
                        icon: L.divIcon({
                            className: 'custom-marker',
                            html: `
                                <div class="mosjid-marker-container">
                                    <div class="mosjid-marker-pin">
                                        <svg viewBox="0 0 24 24" fill="white" style="width:24px;height:24px;">
                                            <path d="M12 2L4.5 11V22H19.5V11L12 2M12 4.44L17.5 11H6.5L12 4.44M11 20H8V13H11V20M16 20H13V13H16V20Z"/>
                                        </svg>
                                    </div>
                                    <div class="mosjid-label" style="background:black; color:white; font-size:10px; padding:2px 6px; border-radius:5px; margin-top:5px; white-space:nowrap; border: 1px solid rgba(255,255,255,0.2)">${spot.name.split(' ')[0]}</div>
                                </div>
                            `,
                            iconSize: [44, 60],
                            iconAnchor: [22, 50]
                        })
                    }).addTo(mapInstance.current);
                    
                    marker.bindPopup(`
                        <div style="padding:10px; text-align:center; font-family: 'Hind Siliguri', sans-serif;">
                            <b style="font-size:14px; color: #10b981;">${spot.name}</b><br/>
                            <p style="font-size:11px; margin: 5px 0; font-style: italic;">${spot.description || 'Shobar jonno iftarer dowa.'}</p>
                            <span style="font-size:12px; font-weight: bold;">${spot.type} - ${spot.count} jon</span><br/>
                            <span style="font-size:10px; color:gray;">Somoy: ${spot.time}</span>
                        </div>
                    `);
                    markersRef.current.push(marker);
                });
            }, [activeSpots]);

            const addNewSpot = async () => {
                if (!user) return alert("Please wait for authentication...");
                if (!formData.name) return alert("Mosjid er nam likhun");
                
                const { db, appId, collection, addDoc } = window.fbSDK;

                try {
                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'spots'), {
                        ...formData,
                        createdAt: Date.now(),
                        userId: user.uid
                    });
                    setIsModalOpen(false);
                    setPickingLocation(false);
                    setFormData({ name: '', type: 'Biriyani', count: '', time: '18:00', description: '', lat: 23.8103, lng: 90.4125 });
                } catch (e) {
                    alert("Error saving spot: " + e.message);
                }
            };

            return (
                <div className="h-screen w-screen flex flex-col bg-[#080808] relative">
                    {isLoading && (
                        <div className="loading-screen">
                            <span className="text-8xl animate-bounce mb-8">🕌</span>
                            <p className="text-emerald-500 font-bold tracking-widest animate-pulse uppercase">Live Map Load Hocche...</p>
                        </div>
                    )}

                    {/* AI Smart Tip Overlay */}
                    {isAIChatOpen && (
                        <div className="fixed top-20 left-1/2 -translate-x-1/2 z-50 w-[90%] max-w-md p-4 bg-emerald-900/90 backdrop-blur-md rounded-2xl border border-emerald-500/30 shadow-2xl chat-bubble">
                            <div className="flex justify-between items-start mb-2">
                                <span className="text-xs font-black uppercase text-emerald-400">✨ AI Shohayok</span>
                                <button onClick={() => setIsAIChatOpen(false)} className="text-white/50 hover:text-white">✕</button>
                            </div>
                            <p className="text-sm font-medium leading-relaxed">{aiTip}</p>
                        </div>
                    )}

                    {/* Top Bar */}
                    <header className={`p-4 z-20 transition-all ${pickingLocation ? 'hidden' : 'block'}`}>
                        <div className="flex gap-3 bg-black/40 backdrop-blur-xl p-3 rounded-3xl border border-white/5 shadow-2xl items-center">
                            <div className="bg-emerald-500 w-10 h-10 rounded-2xl flex items-center justify-center text-xl shadow-lg shadow-emerald-500/20">🍛</div>
                            <input 
                                className="flex-1 bg-transparent outline-none text-sm font-bold placeholder:text-gray-600" 
                                placeholder="Mosjid khujun..."
                                value={searchQuery}
                                onChange={(e) => setSearchQuery(e.target.value)}
                            />
                            <button onClick={getSmartTip} className="bg-white/5 p-2 rounded-xl hover:bg-white/10 transition-colors" title="AI Tips">
                                ✨
                            </button>
                        </div>
                    </header>

                    {/* Map Container */}
                    <div ref={mapRef} className="flex-1 relative z-10">
                        {pickingLocation && (
                            <div className="absolute inset-0 pointer-events-none z-30 flex items-center justify-center">
                                <div className="mb-10 text-emerald-500 animate-bounce drop-shadow-[0_0_10px_rgba(16,185,129,0.5)]">
                                    <svg width="40" height="40" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/></svg>
                                </div>
                                <div className="absolute bottom-10 left-1/2 -translate-x-1/2 pointer-events-auto bg-emerald-600 px-10 py-4 rounded-full font-black shadow-[0_10px_40px_rgba(16,185,129,0.4)] active:scale-95 transition-all text-white tracking-tight" onClick={addNewSpot}>
                                    Ekhane Spot Rakhi
                                </div>
                            </div>
                        )}
                    </div>

                    {/* Action Buttons */}
                    <div className={`fixed bottom-10 right-6 z-20 flex flex-col gap-4 ${pickingLocation ? 'hidden' : 'flex'}`}>
                        <button 
                            className="w-14 h-14 bg-emerald-600/20 backdrop-blur-md border border-emerald-500/20 rounded-3xl flex items-center justify-center shadow-2xl text-emerald-400"
                            onClick={() => {
                                if (mapInstance.current) mapInstance.current.locate({ setView: true, maxZoom: 16 });
                            }}
                        >
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/></svg>
                        </button>
                        <button 
                            className="w-16 h-16 bg-orange-600 rounded-[2rem] flex items-center justify-center shadow-2xl text-4xl font-bold transition-transform hover:rotate-90"
                            onClick={() => setIsModalOpen(true)}
                        >
                            +
                        </button>
                    </div>

                    {/* Add Modal */}
                    {isModalOpen && (
                        <div className="fixed inset-0 z-50 bg-black/95 flex items-center justify-center p-6 backdrop-blur-lg animate-in fade-in duration-200">
                            <div className="bg-[#121212] w-full max-w-sm p-8 rounded-[3rem] border border-white/5 shadow-2xl relative">
                                <button className="absolute top-6 right-8 text-gray-500 text-xl" onClick={() => setIsModalOpen(false)}>✕</button>
                                <h3 className="text-2xl font-black mb-6 tracking-tight">Spot Info ✨</h3>
                                
                                <div className="space-y-4">
                                    <input 
                                        className="w-full bg-black p-4 rounded-2xl border border-white/5 outline-none font-bold placeholder:text-gray-700" 
                                        placeholder="Masjid-er Nam"
                                        value={formData.name}
                                        onChange={(e) => setFormData({...formData, name: e.target.value})}
                                    />
                                    
                                    <div className="grid grid-cols-2 gap-3">
                                        <select className="bg-black p-4 rounded-2xl outline-none border border-white/5 text-white font-bold" value={formData.type} onChange={(e) => setFormData({...formData, type: e.target.value})}>
                                            <option value="Biriyani">Biriyani</option>
                                            <option value="Khichuri">Khichuri</option>
                                            <option value="Haleem">Haleem</option>
                                            <option value="Tehari">Tehari</option>
                                        </select>
                                        <input type="number" placeholder="Jon-er Shonkha" className="bg-black p-4 rounded-2xl outline-none border border-white/5 text-white font-bold" onChange={(e) => setFormData({...formData, count: e.target.value})} />
                                    </div>

                                    <div className="flex gap-2 items-center bg-black rounded-2xl border border-white/5 p-2 pr-4">
                                        <input 
                                            className="flex-1 bg-transparent p-2 outline-none text-xs font-medium text-gray-300" 
                                            placeholder="AI Barta generate kora jay..."
                                            value={formData.description}
                                            onChange={(e) => setFormData({...formData, description: e.target.value})}
                                        />
                                        <button 
                                            onClick={generateAIDescription}
                                            disabled={isGenerating}
                                            className="bg-emerald-600/20 text-emerald-400 px-3 py-1.5 rounded-xl text-[10px] font-black hover:bg-emerald-600/30 transition-all disabled:opacity-50"
                                        >
                                            {isGenerating ? "✨..." : "✨ Barta Likhun"}
                                        </button>
                                    </div>

                                    <div className="flex items-center gap-3">
                                        <label className="text-xs font-bold text-gray-500 uppercase ml-2">Somoy:</label>
                                        <input type="time" className="bg-black p-3 rounded-xl flex-1 outline-none border border-white/5 text-white font-bold" value={formData.time} onChange={(e) => setFormData({...formData, time: e.target.value})} />
                                    </div>
                                </div>

                                <button 
                                    className="w-full bg-emerald-600 py-5 rounded-[1.5rem] font-black text-lg shadow-xl shadow-emerald-500/20 mt-8 active:scale-95 transition-all"
                                    onClick={() => { setIsModalOpen(false); setPickingLocation(true); }}
                                >
                                    Map-e Location dekhai
                                </button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
