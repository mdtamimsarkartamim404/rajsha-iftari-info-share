<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rajshahi Real Iftar Map</title>
    
    <!-- Scripts & Stylesheets -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Leaflet Map -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&display=swap');
        
        body {
            font-family: 'Hind Siliguri', sans-serif;
            margin: 0;
            background-color: #000;
        }

        .custom-scrollbar::-webkit-scrollbar { width: 0px; }
        .leaflet-popup-content-wrapper { border-radius: 1.5rem !important; padding: 0 !important; overflow: hidden; }
        .leaflet-popup-content { margin: 0 !important; width: auto !important; }
        .leaflet-container { background: #111 !important; }
        
        @keyframes pulse-blue {
            0% { transform: scale(0.95); opacity: 0.7; }
            50% { transform: scale(1.2); opacity: 0.3; }
            100% { transform: scale(0.95); opacity: 0.7; }
        }
        .user-location-pulse { animation: pulse-blue 2s infinite; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // UI Icons definition - Fixed missing components to resolve React Error #130
        const Icons = {
            MapPin: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>,
            MapIcon: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"/><line x1="8" y1="2" x2="8" y2="18"/><line x1="16" y1="6" x2="16" y2="22"/></svg>,
            Plus: () => <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12h14m-7-7v14"/></svg>,
            Navigation: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="3 11 22 2 13 21 11 13 3 11"/></svg>,
            X: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 6 6 18M6 6l12 12"/></svg>,
            ThumbsUp: () => <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M7 10v12M15 5.88s-1.33-3.95-3.67-4.51a1.21 1.21 0 0 0-1.45 1.05c-.08.6-.13 1.28-.13 2.02 0 2.05-1.08 4.09-2.69 5.2a1.24 1.24 0 0 0-.06 1.94l6.03 6c.47.47 1.1.71 1.74.71H19a2 2 0 0 0 2-2V10a2 2 0 0 0-2-2h-3.48c.14-.65.25-1.37.25-2.12a5.5 5.5 0 0 0-1.27-3.44z"/></svg>,
            ThumbsDown: () => <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17 14V2M9 18.12s1.33 3.95 3.67 4.51c.39.09.81-.01 1.1-.3a1.2 1.2 0 0 0 .35-.75c.08-.6.13-1.28.13-2.02 0-2.05 1.08-4.09 2.69-5.2a1.24 1.24 0 0 0 .06-1.94l-6.03-6a2.43 2.43 0 0 0-1.74-.71H5a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h3.48c-.14.65-.25 1.37-.25 2.12a5.5 5.5 0 0 0 1.27 3.44z"/></svg>,
            Info: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4m0-4h.01"/></svg>,
            Locate: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="2" x2="5" y1="12" y2="12"/><line x1="19" x2="22" y1="12" y2="12"/><line x1="12" x2="12" y1="2" y2="5"/><line x1="12" x2="12" y1="19" y2="22"/><circle cx="12" cy="12" r="7"/><circle cx="12" cy="12" r="3"/></svg>,
            Check: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 6 9 17l-5-5"/></svg>,
            Layers: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>
        };

        const App = () => {
            const [activeSpots, setActiveSpots] = useState([]);
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [isBottomSheetOpen, setIsBottomSheetOpen] = useState(false);
            const [pickingLocation, setPickingLocation] = useState(false);
            const [selectedLocation, setSelectedLocation] = useState(null);
            const [currentAdab, setCurrentAdab] = useState("");
            const [userVotes, setUserVotes] = useState({});
            const [showSuccess, setShowSuccess] = useState(false);
            const [formData, setFormData] = useState({ name: '', type: 'বিরিয়ানি', manualItem: '', time: '18:30', description: '' });

            const mapRef = useRef(null);
            const mapInstance = useRef(null);
            const markersRef = useRef({});
            const tempMarkerRef = useRef(null);
            const userMarkerRef = useRef(null);

            const RAJSHAHI_COORDS = [24.3636, 88.6001];

            const ADABS = [
                "দ্রুত ইফতার: সূর্যাস্ত হওয়া মাত্র দেরি না করে দ্রুত ইফতার করা সুন্নত।",
                "সুন্নত শুরু: ইফতারের শুরু-তে বিজোড় সংখ্যক খেজুর বা পানি খাওয়া সুন্নত।",
                "স্বাস্থ্যকর খাবার: ভাজাপোড়া কম খেয়ে বেশি করে ফল ও সবজি খান।",
                "পানি পান: ইফতারের পর থেকে সেহরি পর্যন্ত পরিমিত পানি পান করুন।",
                "দোয়া কবুল: ইফতারের ঠিক আগের সময়টুকু দোয়া কবুলের সেরা সময়।",
                "পরিচ্ছন্নতা: মসজিদে ইফতার করলে থালা-বাসন নির্দিষ্ট স্থানে রাখুন।",
                "সেহরির সময়: সেহরি শেষ সময়ে খাওয়া সুন্নত, এতে শরীরে শক্তি থাকে।",
                "পেট ঠান্ডা: একসাথে বেশি না খেয়ে বিরতি দিয়ে খাবার খান।",
                "সম্প্রীতি: ইফতারের সময় পাড়া-প্রতিবেশীর খোঁজ নিন ও মিলেমিশে করুন।",
                "আদব: নামাজের সময় ফোন সাইলেন্ট রাখুন যাতে অন্যের সমস্যা না হয়।"
            ];

            useEffect(() => {
                const savedVotes = localStorage.getItem('iftar_map_votes');
                if (savedVotes) setUserVotes(JSON.parse(savedVotes));

                setCurrentAdab(ADABS[Math.floor(Math.random() * ADABS.length)]);
                const adabInterval = setInterval(() => {
                    setCurrentAdab(ADABS[Math.floor(Math.random() * ADABS.length)]);
                }, 15000);

                const checkReset = () => {
                    const now = new Date();
                    setActiveSpots(prev => prev.filter(spot => {
                        const spotDate = new Date(spot.createdAt);
                        const spotIftarTime = spot.time.split(':');
                        const resetTime = new Date(spotDate);
                        resetTime.setHours(parseInt(spotIftarTime[0]), parseInt(spotIftarTime[1]), 0, 0);
                        const diffInHours = (now - resetTime) / (1000 * 60 * 60);
                        return diffInHours < 12 && diffInHours > -12;
                    }));
                };
                
                checkReset();
                const interval = setInterval(checkReset, 60000);
                return () => { clearInterval(interval); clearInterval(adabInterval); };
            }, []);

            const handleVote = (id, type) => {
                if (userVotes[id]) return;
                setActiveSpots(prev => prev.map(s => {
                    if (s.id === id) {
                        const voteKey = type === 'real' ? 'realVotes' : 'fakeVotes';
                        return { ...s, [voteKey]: (s[voteKey] || 0) + 1 };
                    }
                    return s;
                }));
                const newVotes = { ...userVotes, [id]: type };
                setUserVotes(newVotes);
                localStorage.setItem('iftar_map_votes', JSON.stringify(newVotes));
            };

            window.handleMapVote = (id, type) => handleVote(id, type);

            useEffect(() => {
                if (!mapRef.current || mapInstance.current) return;
                
                mapInstance.current = L.map(mapRef.current, {
                    zoomControl: false,
                    attributionControl: false
                }).setView(RAJSHAHI_COORDS, 16);

                L.tileLayer('https://{s}.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', {
                    maxZoom: 20,
                    subdomains:['mt0','mt1','mt2','mt3']
                }).addTo(mapInstance.current);

                mapInstance.current.on('locationfound', (e) => {
                    if (userMarkerRef.current) userMarkerRef.current.remove();
                    userMarkerRef.current = L.marker(e.latlng, {
                        icon: L.divIcon({
                            className: 'user-marker',
                            html: `<div class="relative flex items-center justify-center">
                                    <div class="absolute w-12 h-12 bg-blue-500 rounded-full user-location-pulse"></div>
                                    <div class="relative w-4 h-4 bg-blue-600 border-2 border-white rounded-full shadow-2xl"></div>
                                   </div>`,
                            iconSize: [40, 40]
                        })
                    }).addTo(mapInstance.current);
                });
            }, []);

            useEffect(() => {
                if (!mapInstance.current) return;
                const onMapClick = (e) => {
                    if (pickingLocation) {
                        if (tempMarkerRef.current) tempMarkerRef.current.remove();
                        setSelectedLocation(e.latlng);
                        tempMarkerRef.current = L.marker(e.latlng, {
                            icon: L.divIcon({
                                className: 'temp-marker',
                                html: `<div class="w-14 h-14 bg-white rounded-full border-4 border-emerald-500 shadow-2xl flex items-center justify-center text-2xl animate-bounce">📍</div>`,
                                iconSize: [56, 56],
                                iconAnchor: [28, 56]
                            })
                        }).addTo(mapInstance.current);
                        mapInstance.current.flyTo(e.latlng, 18);
                    }
                };
                mapInstance.current.on('click', onMapClick);
                return () => mapInstance.current.off('click', onMapClick);
            }, [pickingLocation]);

            useEffect(() => {
                if (!mapInstance.current) return;
                Object.values(markersRef.current).forEach(m => m.remove());
                markersRef.current = {};

                activeSpots.forEach(spot => {
                    const icon = L.divIcon({
                        className: 'custom-icon',
                        html: `<div class="bg-white p-1 rounded-full shadow-2xl border-2 border-emerald-500">
                                <div class="bg-emerald-500 w-10 h-10 rounded-full flex items-center justify-center text-white text-lg">🍛</div>
                               </div>`,
                        iconSize: [44, 44],
                        iconAnchor: [22, 44]
                    });
                    const marker = L.marker([spot.lat, spot.lng], { icon }).addTo(mapInstance.current);
                    marker.bindPopup(`
                        <div class="p-4 font-sans text-gray-800 min-w-[220px]">
                            <h3 class="font-bold text-lg text-emerald-700 leading-tight">${spot.name}</h3>
                            <p class="text-[11px] font-bold text-gray-500 mt-1 mb-3">🕒 ইফতার: ${spot.time} PM</p>
                            <div class="bg-emerald-50 text-emerald-700 p-2.5 rounded-2xl text-xs font-bold mb-3 border border-emerald-100">মেনু: ${spot.type}</div>
                            <p class="text-[11px] text-gray-600 italic mb-4 leading-relaxed">"${spot.description || 'সবাই আমন্ত্রিত'}"</p>
                            <div class="flex gap-2 border-t pt-3">
                                <button onclick="window.handleMapVote('${spot.id}', 'real')" class="flex-1 bg-emerald-100 text-emerald-700 py-2.5 rounded-xl text-[10px] font-bold uppercase active:scale-95 transition-all">👍 আসল (${spot.realVotes || 0})</button>
                                <button onclick="window.handleMapVote('${spot.id}', 'fake')" class="flex-1 bg-red-50 text-red-600 py-2.5 rounded-xl text-[10px] font-bold uppercase active:scale-95 transition-all">👎 ভুয়া (${spot.fakeVotes || 0})</button>
                            </div>
                        </div>
                    `, { closeButton: false });
                    markersRef.current[spot.id] = marker;
                });
            }, [activeSpots, userVotes]);

            const startPicking = () => {
                setIsModalOpen(false);
                setPickingLocation(true);
                mapInstance.current?.locate({ setView: true, maxZoom: 18 });
            };

            const handleAddSpot = () => {
                if (!formData.name || !selectedLocation) return;
                const finalType = formData.type === 'অন্যান্য' ? (formData.manualItem || 'অন্যান্য') : formData.type;
                const newSpot = {
                    id: Date.now().toString(),
                    ...formData,
                    type: finalType,
                    lat: selectedLocation.lat,
                    lng: selectedLocation.lng,
                    realVotes: 0,
                    fakeVotes: 0,
                    createdAt: new Date().toISOString()
                };
                setActiveSpots(prev => [...prev, newSpot]);
                setPickingLocation(false);
                setSelectedLocation(null);
                setFormData({ name: '', type: 'বিরিয়ানি', manualItem: '', time: '18:30', description: '' });
                if (tempMarkerRef.current) tempMarkerRef.current.remove();
                setShowSuccess(true);
                setTimeout(() => setShowSuccess(false), 3000);
                mapInstance.current.flyTo([newSpot.lat, newSpot.lng], 18);
            };

            return (
                <div className="h-screen w-full bg-black flex flex-col font-sans text-white overflow-hidden relative">
                    {showSuccess && (
                        <div className="fixed top-24 left-1/2 -translate-x-1/2 z-[5000] w-[90%] max-w-sm animate-bounce">
                            <div className="bg-emerald-600 p-4 rounded-[2rem] shadow-2xl flex items-center gap-3 border border-white/20">
                                <div className="bg-white p-1 rounded-full text-emerald-600"><Icons.Check /></div>
                                <div>
                                    <p className="font-bold text-sm text-white">ইফতার পয়েন্ট যোগ হয়েছে!</p>
                                    <p className="text-[10px] text-emerald-100 font-bold uppercase tracking-widest">সবাইকে জানানোর জন্য ধন্যবাদ</p>
                                </div>
                            </div>
                        </div>
                    )}

                    <div className="absolute top-0 left-0 right-0 z-[1000] p-4 pointer-events-none">
                        <div className="max-w-md mx-auto flex flex-col gap-3">
                            <div className="bg-white/95 backdrop-blur-xl p-4 rounded-[2.5rem] flex justify-between items-center pointer-events-auto shadow-2xl border border-white">
                                <div className="flex items-center gap-3">
                                    <div className="bg-emerald-600 p-2.5 rounded-2xl text-white shadow-lg"><Icons.MapPin /></div>
                                    <div className="text-gray-900">
                                        <h1 className="text-sm font-black uppercase leading-none">রিয়েল ইফতার ম্যাপ</h1>
                                        <p className="text-[9px] font-bold text-emerald-600 uppercase mt-0.5 tracking-widest">রাজশাহী লাইভ আপডেট</p>
                                    </div>
                                </div>
                                <div className="bg-emerald-50 px-3 py-1.5 rounded-full flex items-center gap-2 border border-emerald-100">
                                    <div className="w-2.5 h-2.5 bg-emerald-500 rounded-full animate-pulse"></div>
                                    <span className="text-[10px] font-bold text-emerald-700 uppercase">{activeSpots.length} সক্রিয়</span>
                                </div>
                            </div>
                            {!pickingLocation && (
                                <div className="bg-black/60 backdrop-blur-md border border-white/10 p-3 rounded-2xl">
                                    <div className="flex items-start gap-2">
                                        <div className="text-emerald-400 mt-0.5"><Icons.Info /></div>
                                        <p className="text-[10px] leading-relaxed text-gray-100 italic">{currentAdab}</p>
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>

                    <div ref={mapRef} className="flex-1 relative z-10 bg-neutral-900" />

                    {pickingLocation && (
                        <div className="absolute bottom-12 inset-x-0 z-[2000] px-6">
                            <div className="bg-white p-7 rounded-[3.5rem] shadow-2xl flex flex-col gap-5 max-w-sm mx-auto border-4 border-emerald-500">
                                <div className="text-center text-gray-900">
                                    <h3 className="font-bold text-xl leading-tight">স্পট নিশ্চিত করুন</h3>
                                    <p className="text-[10px] text-gray-500 font-bold uppercase mt-1 tracking-widest">
                                        {selectedLocation ? "লোকেশন পাওয়া গেছে ✅" : "ম্যাপে স্পট-এর ওপর টাচ করুন"}
                                    </p>
                                </div>
                                <div className="flex gap-2">
                                    <button onClick={() => {setPickingLocation(false); setIsModalOpen(true);}} className={`flex-1 py-4.5 rounded-3xl font-bold text-sm transition-all shadow-xl active:scale-95 ${selectedLocation ? 'bg-emerald-600 text-white' : 'bg-gray-100 text-gray-300'}`} disabled={!selectedLocation}>এই খানেই যোগ করুন</button>
                                    <button onClick={() => {setPickingLocation(false); setSelectedLocation(null); if (tempMarkerRef.current) tempMarkerRef.current.remove();}} className="px-6 bg-red-50 text-red-500 py-4.5 rounded-3xl font-bold">বাতিল</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {!pickingLocation && (
                        <div className="fixed bottom-28 right-6 z-[1000] flex flex-col gap-4">
                            <button onClick={() => mapInstance.current?.locate({ setView: true, maxZoom: 18 })} className="w-14 h-14 bg-white rounded-2xl shadow-2xl flex items-center justify-center text-emerald-600 active:scale-90 border-2 border-emerald-100 hover:bg-emerald-50"><Icons.Locate /></button>
                            <button onClick={() => setIsModalOpen(true)} className="w-16 h-16 bg-emerald-600 rounded-[2.2rem] shadow-2xl flex items-center justify-center text-white active:scale-90 border-4 border-white"><Icons.Plus /></button>
                        </div>
                    )}

                    {!pickingLocation && (
                        <div className={`fixed inset-x-0 bottom-0 z-[1500] bg-white rounded-t-[4rem] transition-all duration-700 shadow-2xl ${isBottomSheetOpen ? 'h-[75vh]' : 'h-24'}`}>
                            <div onClick={() => setIsBottomSheetOpen(!isBottomSheetOpen)} className="w-full flex flex-col items-center py-5 cursor-pointer">
                                <div className="w-16 h-1.5 bg-gray-200 rounded-full mb-3 shadow-inner"></div>
                                <div className="flex justify-between w-full px-12 items-center text-gray-900 font-bold uppercase text-xs tracking-widest">
                                    <div className="flex items-center gap-3"><div className="text-emerald-600"><Icons.MapIcon /></div> सक्रिय ইফতার পয়েন্ট লিস্ট</div>
                                    <div className={`transition-transform ${isBottomSheetOpen ? 'rotate-180' : ''}`}>▼</div>
                                </div>
                            </div>
                            <div className="flex-1 overflow-y-auto px-6 pb-14 space-y-4 custom-scrollbar">
                                {activeSpots.length === 0 ? (
                                    <div className="flex flex-col items-center justify-center py-24 opacity-30 text-center"><div className="text-7xl mb-6">🌙</div><p className="text-xs font-bold uppercase text-gray-900">লিস্ট এখন খালি</p></div>
                                ) : (
                                    activeSpots.map(spot => (
                                        <div key={spot.id} className="bg-gray-50 p-6 rounded-[2.5rem] flex gap-4 items-center border border-gray-100 active:scale-[0.98] transition-all shadow-sm">
                                            <div className="w-16 h-16 bg-emerald-600 text-white rounded-[1.8rem] flex items-center justify-center text-3xl shadow-lg border-2 border-white/20">🕌</div>
                                            <div className="flex-1 min-w-0">
                                                <h4 className="font-bold text-gray-900 truncate text-base mb-1">{spot.name}</h4>
                                                <div className="flex items-center gap-2 mb-3">
                                                    <span className="text-[10px] font-bold text-gray-400 bg-white px-2 py-0.5 rounded-full border border-gray-100">{spot.time} PM</span>
                                                    <span className="text-[10px] font-bold text-emerald-600 uppercase tracking-tighter">{spot.type}</span>
                                                </div>
                                                <div className="flex gap-2">
                                                    <button onClick={(e) => { e.stopPropagation(); handleVote(spot.id, 'real'); }} className={`flex-1 py-2 rounded-xl text-[10px] font-bold border transition-all ${userVotes[spot.id] === 'real' ? 'bg-emerald-500 text-white border-emerald-500' : 'bg-white text-gray-500 border-gray-200'}`}>আসল ({spot.realVotes || 0})</button>
                                                    <button onClick={(e) => { e.stopPropagation(); handleVote(spot.id, 'fake'); }} className={`flex-1 py-2 rounded-xl text-[10px] font-bold border transition-all ${userVotes[spot.id] === 'fake' ? 'bg-red-500 text-white border-red-500' : 'bg-white text-gray-400 border-gray-200'}`}>ভুয়া ({spot.fakeVotes || 0})</button>
                                                </div>
                                            </div>
                                            <button onClick={() => {mapInstance.current.flyTo([spot.lat, spot.lng], 19); setIsBottomSheetOpen(false);}} className="p-4 bg-white border border-gray-200 rounded-[2rem] text-emerald-600 shadow-xl"><Icons.Navigation /></button>
                                        </div>
                                    ))
                                )}
                            </div>
                        </div>
                    )}

                    {isModalOpen && (
                        <div className="fixed inset-0 z-[3000] bg-black/95 backdrop-blur-xl p-6 flex items-center justify-center">
                            <div className="bg-white w-full max-w-sm p-8 rounded-[4rem] border-4 border-emerald-500 shadow-2xl relative max-h-[92vh] overflow-y-auto custom-scrollbar">
                                <button onClick={() => setIsModalOpen(false)} className="absolute top-10 right-10 text-gray-300 hover:text-gray-900 transition-colors"><Icons.X /></button>
                                <h2 className="text-2xl font-black mb-10 text-gray-900 text-center leading-tight">ইফতার পয়েন্ট শেয়ার করুন</h2>
                                <div className="space-y-6">
                                    <input className="w-full bg-gray-50 p-5 rounded-3xl border border-gray-100 font-bold text-sm text-gray-900 outline-none focus:border-emerald-500 shadow-inner" placeholder="মসজিদের নাম" value={formData.name} onChange={e => setFormData({...formData, name: e.target.value})} />
                                    <div className="grid grid-cols-2 gap-4">
                                        <div className="relative">
                                            <select className="w-full bg-gray-50 p-5 rounded-3xl border border-gray-100 font-bold text-sm text-gray-900 outline-none appearance-none" value={formData.type} onChange={e => setFormData({...formData, type: e.target.value})}>
                                                <option value="বিরিয়ানি">বিরিয়ানি</option><option value="খিচুড়ি">খিচুড়ি</option><option value="হালিম">হালিম</option><option value="অন্যান্য">অন্যান্য</option>
                                            </select>
                                            <div className="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-gray-400">▼</div>
                                        </div>
                                        <input type="time" className="bg-gray-50 p-5 rounded-3xl border border-gray-100 font-bold text-sm text-gray-900 outline-none focus:border-emerald-500" value={formData.time} onChange={e => setFormData({...formData, time: e.target.value})} />
                                    </div>
                                    {formData.type === 'অন্যান্য' && <input className="w-full bg-emerald-50 p-5 rounded-3xl border border-emerald-200 font-bold text-sm text-emerald-900 outline-none" placeholder="কি খাবার?" value={formData.manualItem} onChange={e => setFormData({...formData, manualItem: e.target.value})} />}
                                    <textarea className="w-full bg-gray-50 p-5 rounded-3xl border border-gray-100 font-bold text-xs h-24 text-gray-900 outline-none resize-none shadow-inner" placeholder="বিস্তারিত আমন্ত্রণ..." value={formData.description} onChange={e => setFormData({...formData, description: e.target.value})} />
                                    {!selectedLocation ? (
                                        <button onClick={startPicking} className="w-full bg-emerald-600 py-6 rounded-3xl font-black text-sm text-white shadow-2xl flex items-center justify-center gap-3 active:scale-95 mt-4"><Icons.MapPin /> ম্যাপে লোকেশন দিন</button>
                                    ) : (
                                        <div className="flex flex-col gap-4 mt-4">
                                            <div className="bg-emerald-50 p-5 rounded-3xl border-2 border-dashed border-emerald-200 flex justify-between items-center">
                                                <span className="text-[10px] font-black text-emerald-600 uppercase tracking-widest">লোকেশন প্রস্তুত ✅</span>
                                                <button onClick={startPicking} className="text-emerald-600 bg-white p-2 rounded-xl shadow-sm"><Icons.Layers /></button>
                                            </div>
                                            <button onClick={handleAddSpot} className="w-full bg-emerald-600 py-6 rounded-[2.5rem] font-black text-xl text-white shadow-2xl active:scale-95">লাইভ করুন 🚀</button>
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
