    <!-- CDNs -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Leaflet Map -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&display=swap');
        
        body {
            font-family: 'Hind Siliguri', sans-serif;
            background-color: #080808;
            color: white;
            margin: 0;
            overflow: hidden;
        }

        .mosjid-marker-pin {
            width: 44px; height: 44px; border-radius: 12px 12px 12px 2px;
            transform: rotate(-45deg); display: flex; align-items: center; justify-content: center;
            background: #10b981; border: 2px solid white; box-shadow: 0 4px 15px rgba(16,185,129,0.4);
        }
        .mosjid-marker-pin svg { transform: rotate(45deg); }
        
        .user-marker {
            width: 16px; height: 16px; background: #3b82f6; border: 3px solid white;
            border-radius: 50%; box-shadow: 0 0 15px #3b82f6;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.5); opacity: 0.5; }
            100% { transform: scale(1); opacity: 1; }
        }

        .leaflet-popup-content-wrapper { border-radius: 1.5rem; background: white; color: black; padding: 0; }
        .leaflet-container { background: #080808 !important; }
        
        .loading-screen {
            position: fixed; inset: 0; background: #080808; z-index: 100;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* লোকেশন পিকারের জন্য স্টাইল */
        .center-pin {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -100%);
            z-index: 1000;
            pointer-events: none;
            text-shadow: 0 0 20px rgba(16, 185, 129, 0.8);
        }

        .temp-marker {
            background: transparent;
        }
        
        /* আদব কার্ডের জন্য স্টাইল */
        .adab-card {
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.2), rgba(0, 0, 0, 0.9));
            border-left: 4px solid #10b981;
            backdrop-filter: blur(10px);
        }
        
        /* জুম কন্ট্রোল কাস্টমাইজ */
        .leaflet-control-zoom {
            border: none !important;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5) !important;
        }
        
        .leaflet-control-zoom a {
            background-color: #1a1a1a !important;
            color: #10b981 !important;
            border: 1px solid #333 !important;
            width: 40px !important;
            height: 40px !important;
            line-height: 40px !important;
            font-size: 20px !important;
        }
        
        .leaflet-control-zoom a:hover {
            background-color: #10b981 !important;
            color: white !important;
        }
        
        /* গুগল ম্যাপ স্টাইল টাইলস */
        .leaflet-tile {
            filter: brightness(0.8) contrast(1.2);
        }
        
        /* লাইক/ডিসলাইক বাটনের জন্য স্টাইল */
        .vote-button {
            transition: all 0.2s ease;
        }
        .vote-button:hover {
            transform: scale(1.1);
        }
        .vote-button:active {
            transform: scale(0.95);
        }
        
        /* সার্চ সাজেশন বক্স */
        .search-suggestion {
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            max-height: 300px;
            overflow-y: auto;
        }
        
        .search-suggestion-item {
            transition: all 0.2s ease;
        }
        
        .search-suggestion-item:hover {
            background: rgba(16, 185, 129, 0.2);
        }
    </style>
</head>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const App = () => {
            const [activeSpots, setActiveSpots] = useState([]);
            const [isBottomSheetOpen, setIsBottomSheetOpen] = useState(false);
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [pickingLocation, setPickingLocation] = useState(false);
            const [isLoading, setIsLoading] = useState(true);
            const [searchQuery, setSearchQuery] = useState("");
            const [selectedLocation, setSelectedLocation] = useState(null);
            const [tempMarker, setTempMarker] = useState(null);
            const [currentAdabs, setCurrentAdabs] = useState([]);
            const [autoLocation, setAutoLocation] = useState(null);
            const [locationInput, setLocationInput] = useState("");
            const [userVotes, setUserVotes] = useState({});
            const [searchSuggestions, setSearchSuggestions] = useState([]);
            const [showSuggestions, setShowSuggestions] = useState(false);
            
            // রাজশাহীর ডিফল্ট কোঅর্ডিনেট
            const RAJSHAHI_COORDS = { lat: 24.3636, lng: 88.6001 };
            
            const [formData, setFormData] = useState({
                name: '', type: 'Biriyani', manualItem: '', time: '18:00', description: '', lat: RAJSHAHI_COORDS.lat, lng: RAJSHAHI_COORDS.lng
            });

            const mapRef = useRef(null);
            const mapInstance = useRef(null);
            const markersRef = useRef([]);
            const userMarkerRef = useRef(null);
            const searchInputRef = useRef(null);

            // ডেমো ডাটা লোড করা
            useEffect(() => {
                if (window.DEMO_MODE) {
                    setActiveSpots(window.DEMO_SPOTS);
                    setIsLoading(false);
                }
                
                // লোকাল স্টোরেজ থেকে ভোট লোড করা
                const savedVotes = localStorage.getItem('userVotes');
                if (savedVotes) {
                    setUserVotes(JSON.parse(savedVotes));
                }
                
                // প্রতি ৩০ সেকেন্ডে নতুন আদব দেখাবে
                const interval = setInterval(() => {
                    updateAdab();
                }, 30000);
                
                // প্রথমবার আদব দেখাও
                updateAdab();
                
                return () => clearInterval(interval);
            }, []);
            
            // র‍্যান্ডম ২ টি আদব সিলেক্ট করার ফাংশন
            const updateAdab = () => {
                const adabs = window.ADAB_LIST;
                const shuffled = [...adabs].sort(() => 0.5 - Math.random());
                const selected = shuffled.slice(0, 2);
                setCurrentAdabs(selected);
            };

            // ম্যাপ ইনিশিয়ালাইজ - রাজশাহীতে ডিফল্ট সেন্টার
            useEffect(() => {
                if (!mapRef.current || mapInstance.current) return;
                
                console.log("ম্যাপ ইনিশিয়ালাইজ হচ্ছে...");
                
                mapInstance.current = L.map(mapRef.current, { 
                    zoomControl: true,
                    attributionControl: false,
                    zoomSnap: 0.5,
                    wheelPxPerZoomLevel: 120
                }).setView([RAJSHAHI_COORDS.lat, RAJSHAHI_COORDS.lng], 13);
                
                // গুগল ম্যাপ স্টাইলের টাইলস
                L.tileLayer('https://{s}.google.com/vt/lyrs=m&x={x}&y={y}&z={z}', {
                    maxZoom: 20,
                    subdomains: ['mt0', 'mt1', 'mt2', 'mt3']
                }).addTo(mapInstance.current);

                // ইউজার লোকেশন ট্র্যাক
                mapInstance.current.locate({ 
                    setView: true,
                    watch: true, 
                    maxZoom: 16,
                    enableHighAccuracy: true
                });
                
                mapInstance.current.on('locationfound', (e) => {
                    console.log("অটো লোকেশন পাওয়া গেছে:", e.latlng);
                    setAutoLocation(e.latlng);
                    
                    if (userMarkerRef.current) userMarkerRef.current.remove();
                    
                    userMarkerRef.current = L.marker(e.latlng, {
                        icon: L.divIcon({ 
                            className: 'user-marker',
                            html: '<div style="width: 16px; height: 16px; background: #3b82f6; border: 3px solid white; border-radius: 50%;"></div>',
                            iconSize: [16, 16] 
                        })
                    }).addTo(mapInstance.current);
                });

                mapInstance.current.on('locationerror', (e) => {
                    console.log("লোকেশন এরর:", e);
                });

                setIsLoading(false);
            }, []);
            
            // লোকেশন পিকিং মোডে সার্চ কোয়েরি পরিবর্তন হলে সাজেশন আপডেট
            useEffect(() => {
                if (pickingLocation && searchQuery.length > 1) {
                    const filtered = window.MOSJID_LIST.filter(m => 
                        m.name.toLowerCase().includes(searchQuery.toLowerCase())
                    );
                    setSearchSuggestions(filtered.slice(0, 7));
                    setShowSuggestions(true);
                } else {
                    setSearchSuggestions([]);
                    setShowSuggestions(false);
                }
            }, [searchQuery, pickingLocation]);
            
            // সার্চ সাজেশন সিলেক্ট করার ফাংশন
            const selectSuggestion = (mosjid) => {
                setSearchQuery(mosjid.name);
                setShowSuggestions(false);
                
                // ম্যাপের ভিউ সেখানে সেট করুন
                mapInstance.current.setView([mosjid.lat, mosjid.lng], 18);
                
                // আগের টেম্প মার্কার সরান
                if (tempMarker) {
                    mapInstance.current.removeLayer(tempMarker);
                }
                
                // নতুন টেম্প মার্কার দেখান
                const newMarker = L.marker([mosjid.lat, mosjid.lng], {
                    icon: L.divIcon({
                        className: 'temp-marker',
                        html: '<div style="width: 40px; height: 40px; background: #10b981; border: 4px solid white; border-radius: 50%; box-shadow: 0 0 30px #10b981; animation: pulse 1s infinite;"></div>',
                        iconSize: [40, 40]
                    })
                }).addTo(mapInstance.current);
                
                setTempMarker(newMarker);
                setSelectedLocation({ lat: mosjid.lat, lng: mosjid.lng });
                
                // ফর্ম ডাটা আপডেট
                setFormData(prev => ({ 
                    ...prev, 
                    lat: mosjid.lat, 
                    lng: mosjid.lng,
                    name: mosjid.name // অটো মসজিদের নাম সেট করা
                }));
                
                // কীবোর্ড ফোকাস সরানো
                if (searchInputRef.current) {
                    searchInputRef.current.blur();
                }
            };
            
            // গুগল ম্যাপ লিংক থেকে লোকেশন পার্স করার ফাংশন
            const parseGoogleMapsLink = (url) => {
                try {
                    console.log("পার্স করার চেষ্টা:", url);
                    
                    let lat = null, lng = null;
                    
                    // ১. @ ফরম্যাট: @24.3636,88.6001,15z
                    const atMatch = url.match(/@(-?\d+\.\d+),(-?\d+\.\d+)/);
                    if (atMatch) {
                        lat = parseFloat(atMatch[1]);
                        lng = parseFloat(atMatch[2]);
                    }
                    
                    // ২. /place/ ফরম্যাট
                    const placeMatch = url.match(/\/place\/[^\/]+\/(-?\d+\.\d+),(-?\d+\.\d+)/);
                    if (placeMatch) {
                        lat = parseFloat(placeMatch[1]);
                        lng = parseFloat(placeMatch[2]);
                    }
                    
                    // ৩. q= ফরম্যাট
                    const qMatch = url.match(/[?&]q=(-?\d+\.\d+),(-?\d+\.\d+)/);
                    if (qMatch) {
                        lat = parseFloat(qMatch[1]);
                        lng = parseFloat(qMatch[2]);
                    }
                    
                    // ৪. 3d/4d ফরম্যাট
                    const d3dMatch = url.match(/3d(-?\d+\.\d+)!4d(-?\d+\.\d+)/);
                    if (d3dMatch) {
                        lat = parseFloat(d3dMatch[1]);
                        lng = parseFloat(d3dMatch[2]);
                    }
                    
                    if (lat && lng) {
                        return { lat, lng };
                    }
                    
                } catch (e) {
                    console.error("লিংক পার্স করতে সমস্যা:", e);
                }
                return null;
            };

            // লোকেশন পিকিং মোড
            useEffect(() => {
                if (!mapInstance.current) return;
                
                if (pickingLocation) {
                    console.log("লোকেশন পিকিং মোড চালু");
                    
                    if (tempMarker) {
                        mapInstance.current.removeLayer(tempMarker);
                        setTempMarker(null);
                    }
                    
                    setSelectedLocation(null);
                    
                    const handleMapClick = (e) => {
                        console.log("ম্যাপে ক্লিক করা হয়েছে:", e.latlng);
                        
                        if (tempMarker) {
                            mapInstance.current.removeLayer(tempMarker);
                        }
                        
                        const newMarker = L.marker(e.latlng, {
                            icon: L.divIcon({
                                className: 'temp-marker',
                                html: '<div style="width: 40px; height: 40px; background: #10b981; border: 4px solid white; border-radius: 50%; box-shadow: 0 0 30px #10b981; animation: pulse 1s infinite;"></div>',
                                iconSize: [40, 40]
                            })
                        }).addTo(mapInstance.current);
                        
                        setTempMarker(newMarker);
                        setSelectedLocation(e.latlng);
                        
                        setFormData(prev => ({ 
                            ...prev, 
                            lat: e.latlng.lat, 
                            lng: e.latlng.lng

                    };
                    
                    mapInstance.current.on('click', handleMapClick);
                    
                    return () => {
                        mapInstance.current.off('click', handleMapClick);
                        if (tempMarker) {
                            mapInstance.current.removeLayer(tempMarker);
                        }
                    };

            // মার্কার রেন্ডার

                if (!mapInstance.current) return;
                
                console.log("মার্কার রেন্ডার হচ্ছে:", activeSpots.length);
                
                markersRef.current.forEach(m => m.remove());
                markersRef.current = [];

                activeSpots.forEach(spot => {
                    const marker = L.marker([spot.lat, spot.lng], {

                                            <path d="M12 2L4.5 11V22H19.5V11L12 2M12 4.44L17.5 11H6.5L12 4.44M11 20H8V13H11V20M16 20H13V13H16V20Z"/>
                                        </svg>
                                    </div>
                                    <div class="bg-black/90 text-white text-[10px] px-2 py-0.5 rounded border border-white/20 mt-1 whitespace-nowrap">${spot.name?.split(' ')[0] || 'মসজিদ'}</div>
                                </div>
                            `,
                            iconSize: [44, 60],
                            iconAnchor: [22, 50]
                        })

                    marker.bindPopup(`
                        <div class="p-4 text-center font-sans text-black" style="min-width: 200px;">
                            <b class="text-base block mb-2 font-bold">${spot.name || 'মসজিদ'}</b>
                            <p class="text-xs italic mb-3 text-gray-600">${spot.description || 'ইফতার বিতরণ'}</p>
                            <div class="text-sm font-black bg-emerald-100 text-emerald-700 py-2 rounded-lg mb-3">
                                ${spot.type || 'খাবার'}
                            </div>
                            <div class="flex justify-center gap-4 mb-2">
                                <button onclick="window.handleVote('${spot.id}', 'real', event)" 
                                    class="vote-button flex items-center gap-2 px-4 py-2 bg-emerald-50 rounded-xl text-emerald-700 hover:bg-emerald-100 transition-all ${userVotes[spot.id] === 'real' ? 'bg-emerald-200 ring-2 ring-emerald-500' : ''}">
                                    <span class="text-lg">👍</span>
                                    <span class="font-bold">${spot.realVotes || 0}</span>
                                </button>
                                <button onclick="window.handleVote('${spot.id}', 'fake', event)" 
                                    class="vote-button flex items-center gap-2 px-4 py-2 bg-red-50 rounded-xl text-red-700 hover:bg-red-100 transition-all ${userVotes[spot.id] === 'fake' ? 'bg-red-200 ring-2 ring-red-500' : ''}">

                            </div>

                        minWidth: 220

            // ভোট হ্যান্ডলার
            window.handleVote = (spotId, type, event) => {
                event.stopPropagation();
                
                if (userVotes[spotId]) {
                    if (userVotes[spotId] === type) {
                        alert("আপনি ইতিমধ্যেই এই স্পটে ভোট দিয়েছেন!");

                    }
                    return;
                }
                
                const spotIndex = activeSpots.findIndex(s => s.id === spotId);
                if (spotIndex === -1) return;
                
                const updatedSpots = [...activeSpots];
                if (type === 'real') {
                    updatedSpots[spotIndex] = {
                        ...updatedSpots[spotIndex],
                        realVotes: (updatedSpots[spotIndex].realVotes || 0) + 1
                    };
                } else {
                    updatedSpots[spotIndex] = {
                        ...updatedSpots[spotIndex],
                        fakeVotes: (updatedSpots[spotIndex].fakeVotes || 0) + 1

            const setLocationFromLink = () => {

                    return;

                const coords = parseGoogleMapsLink(locationInput);

                    setSelectedLocation(coords);

                        mapInstance.current.removeLayer(tempMarker);

                    const newMarker = L.marker([coords.lat, coords.lng], {
                        icon: L.divIcon({
                            className: 'temp-marker',

                            iconSize: [40, 40]
                        })
                    }).addTo(mapInstance.current);
                    
                    setTempMarker(newMarker);
                    
                    alert("✅ গুগল ম্যাপ থেকে লোকেশন সেট করা হয়েছে!");

            };

            const cancelPicking = () => {
                setPickingLocation(false);
                setIsModalOpen(true);
                if (tempMarker) {
                    mapInstance.current.removeLayer(tempMarker);
                    setTempMarker(null);
                }
                setSelectedLocation(null);
                setLocationInput("");
                setSearchQuery("");
            };

            const filteredSpots = activeSpots.filter(s => 
                s.name?.toLowerCase().includes(searchQuery.toLowerCase()) || 
                (s.type && s.type.toLowerCase().includes(searchQuery.toLowerCase()))
            );

            return (
                <div className="h-screen w-screen flex flex-col bg-[#080808] relative overflow-hidden">
                    {isLoading && (

                            <p className="text-emerald-500 font-bold animate-pulse uppercase tracking-widest">লাইভ ম্যাপ লোড হচ্ছে...</p>
                        </div>
                    )}

                    {/* ইফতার ও মসজিদের আদব - ২ টি র‍্যান্ডম দেখাবে */}
                    {currentAdabs.length > 0 && !pickingLocation && (
                        <div className="absolute top-24 left-4 right-4 z-30 flex flex-col gap-2">
                            {currentAdabs.map((adab, index) => (
                                <div key={adab.id} className="adab-card p-3 rounded-xl shadow-lg animate-in slide-in-from-top duration-500" style={{animationDelay: `${index * 100}ms`}}>
                                    <div className="flex items-start gap-2">
                                        <span className="text-emerald-400 font-bold text-sm bg-emerald-900/30 w-6 h-6 rounded-full flex items-center justify-center shrink-0">✨</span>
                                        <p className="text-white text-xs leading-relaxed">{adab.bn}</p>
                                    </div>

                    )}

                    {/* সার্চ বার - লোকেশন পিকিং মোডে ভিন্ন রকম */}

                                placeholder={pickingLocation ? "মসজিদ খুঁজে সরাসরি সিলেক্ট করুন..." : "মসজিদ খুঁজুন..."}
                                value={searchQuery}
                                onChange={(e) => setSearchQuery(e.target.value)}
                                onFocus={() => pickingLocation && searchQuery.length > 1 && setShowSuggestions(true)}
                                onBlur={() => setTimeout(() => setShowSuggestions(false), 200)}
                            />
                            
                            {/* সার্চ সাজেশন - লোকেশন পিকিং মোডে দেখাবে */}

                                    <p className="text-[8px] text-gray-600 mt-1">

                                {/* অটো লোকেশন বাটন */}

                                    >

                                    </button>

                                {/* লোকেশন তথ্য */}
                                <div className="text-center mb-4">
                                    <p className="text-xs text-gray-500 font-bold uppercase mb-1">

                                    <div className="mt-2 text-white font-bold text-lg">

                                        className={`flex-1 py-4 rounded-xl font-bold text-white transition-all ${
                                            selectedLocation

                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#10b981" strokeWidth="3"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/></svg>
                        </button>
                        <button className="w-16 h-16 bg-orange-600 rounded-full flex items-center justify-center shadow-[0_10px_30px_rgba(234,88,12,0.4)] text-4xl font-bold active:scale-90 transition-all hover:rotate-90 hover:bg-orange-700" onClick={() => setIsModalOpen(true)}>+</button>
                    </div>

                    {/* নিচের লিস্ট */}
                    <div className={`fixed inset-x-0 bottom-0 z-40 bg-[#0c0c0c] border-t border-white/5 rounded-t-[2.5rem] transition-all duration-500 ease-out flex flex-col shadow-[0_-10px_40px_rgba(0,0,0,1)] ${isBottomSheetOpen ? 'h-[75vh]' : 'h-24'} ${pickingLocation ? 'translate-y-full' : ''}`}>
                        <div onClick={() => setIsBottomSheetOpen(!isBottomSheetOpen)} className="w-full flex flex-col items-center py-4 cursor-pointer active:bg-white/5">
                            <div className="w-10 h-1 bg-white/20 rounded-full mb-3"></div>
                            <div className="flex justify-between w-full px-8 items-center">
                                <div className="flex items-center gap-2">
                                    <span className="font-black text-emerald-500 text-sm uppercase tracking-wider">কাছের ডিস্ট্রিবিউশন</span>
                                    <span className="bg-emerald-900/50 text-emerald-400 text-[10px] px-2 py-0.5 rounded-full font-bold">{filteredSpots.length} টা</span>
                                </div>
                                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" className={`transition-transform duration-300 ${isBottomSheetOpen ? 'rotate-180' : ''}`}><path d="m18 15-6-6-6 6"/></svg>
                            </div>
                        </div>
                        <div className="flex-1 overflow-y-auto px-6 pb-10 hide-scrollbar">
                            {filteredSpots.length === 0 ? (
                                <div className="text-center py-20 opacity-20 font-bold">কোনো স্পট পাওয়া যায়নি</div>
                            ) : (
                                <div className="space-y-3">
                                    {filteredSpots.map(spot => (
                                        <div key={spot.id} onClick={() => { mapInstance.current?.flyTo([spot.lat, spot.lng], 17); setIsBottomSheetOpen(false); }} className="bg-white/5 p-4 rounded-[2rem] border border-white/5 flex gap-4 items-center active:bg-white/10 transition-all cursor-pointer">
                                            <div className="w-12 h-12 bg-emerald-500/10 rounded-2xl flex items-center justify-center text-2xl shrink-0">🕌</div>
                                            <div className="flex-1 min-w-0">
                                                <div className="flex justify-between items-center mb-1">
                                                    <h4 className="font-bold text-white truncate text-base tracking-tight">{spot.name}</h4>
                                                    <span className="text-[10px] font-black text-emerald-400 uppercase bg-emerald-500/10 px-2 py-0.5 rounded-md">{spot.type}</span>
                                                </div>
                                                <div className="flex justify-between items-center text-[11px] text-gray-500 font-bold uppercase tracking-widest">
                                                    <span>{spot.time}</span>
                                                    <div className="flex gap-2">
                                                        <span className="text-emerald-400">👍 {spot.realVotes || 0}</span>
                                                        <span className="text-red-400">👎 {spot.fakeVotes || 0}</span>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>
                    </div>

                    {/* স্পট ইনফো মোডাল */}
                    {isModalOpen && (
                        <div className="fixed inset-0 z-50 bg-black/95 flex items-center justify-center p-6 backdrop-blur-lg animate-in fade-in duration-300 overflow-y-auto">
                            <div className="bg-[#121212] w-full max-w-sm p-8 rounded-[3.5rem] border border-white/5 shadow-2xl relative">
                                <button className="absolute top-8 right-8 text-gray-500 text-2xl hover:text-white" onClick={() => setIsModalOpen(false)}>✕</button>
                                <h3 className="text-2xl font-black mb-8 tracking-tighter text-white">ডিস্ট্রিবিউশন তথ্য</h3>
                                <div className="space-y-4">
                                    <div className="space-y-1">
                                        <label className="text-[10px] font-black text-gray-600 uppercase ml-3">মসজিদের নাম *</label>
                                        <input 
                                            className="w-full bg-black p-4 rounded-2xl border border-white/5 outline-none font-bold text-white placeholder:text-gray-700 focus:ring-1 focus:ring-emerald-500/30 transition-all" 
                                            placeholder="যেমন: রাজশাহী কেন্দ্রীয় মসজিদ" 
                                            value={formData.name} 
                                            onChange={(e) => setFormData({...formData, name: e.target.value})} 
                                        />
                                    </div>
                                    <div className="grid grid-cols-2 gap-3">
                                        <div className="space-y-1">
                                            <label className="text-[10px] font-black text-gray-600 uppercase ml-3">মেনু</label>
                                            <select className="w-full bg-black p-4 rounded-2xl outline-none border border-white/5 text-white font-bold appearance-none" value={formData.type} onChange={(e) => setFormData({...formData, type: e.target.value})}>
                                                <option value="Biriyani">বিরিয়ানি</option>
                                                <option value="Khichuri">খিচুড়ি</option>
                                                <option value="Haleem">হালিম</option>
                                                <option value="Other">অন্যান্য</option>
                                            </select>
                                        </div>
                                    </div>
                                    {formData.type === 'Other' && (
                                        <input className="w-full bg-emerald-900/20 p-4 rounded-2xl border border-emerald-500/20 outline-none font-black text-emerald-400" placeholder="আইটেমের নাম লিখুন" value={formData.manualItem} onChange={(e) => setFormData({...formData, manualItem: e.target.value})} />
                                    )}
                                    <div className="space-y-1">
                                        <label className="text-[10px] font-black text-gray-600 uppercase ml-3">আমন্ত্রণ</label>
                                        <input className="w-full bg-black p-4 rounded-2xl border border-white/5 outline-none font-bold text-white placeholder:text-gray-700" placeholder="আমন্ত্রণ লিখুন..." value={formData.description} onChange={(e) => setFormData({...formData, description: e.target.value})} />
                                    </div>
                                    <div className="flex items-center gap-3 bg-black p-1 rounded-2xl border border-white/5">
                                        <label className="text-[10px] text-gray-500 font-black uppercase ml-3 shrink-0">সময়:</label>
                                        <input type="time" className="flex-1 bg-transparent p-4 rounded-xl outline-none text-white font-bold" value={formData.time} onChange={(e) => setFormData({...formData, time: e.target.value})} />
                                    </div>
                                </div>
                                <button 
                                    className="w-full bg-emerald-600 py-6 rounded-full font-black text-lg mt-10 active:scale-95 transition-all shadow-xl shadow-emerald-900/40 hover:bg-emerald-500" 
                                    onClick={() => { 
                                        if(!formData.name) {
                                            alert("মসজিদের নাম লিখুন!");
                                            return;
                                        }
                                        setIsModalOpen(false); 
                                        setPickingLocation(true);
                                    }}
                                >
                                    🗺️ ম্যাপে লোকেশন সিলেক্ট করুন
                                </button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
