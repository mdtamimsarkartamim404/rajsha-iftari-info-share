<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biriyani Dibe Official - AI Powered Live Map</title>
    
    <!-- CDNs -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Leaflet Map -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&display=swap');
        
        body {
            font-family: 'Hind Siliguri', sans-serif;
            background-color: #080808;
            color: white;
            margin: 0;
            overflow: hidden;
        }

        .mosjid-marker-pin {
            width: 44px; height: 44px; border-radius: 12px 12px 12px 2px;
            transform: rotate(-45deg); display: flex; align-items: center; justify-content: center;
            background: #10b981; border: 2px solid white; box-shadow: 0 4px 15px rgba(16,185,129,0.4);
        }
        .mosjid-marker-pin svg { transform: rotate(45deg); }
        
        .user-marker {
            width: 16px; height: 16px; background: #3b82f6; border: 3px solid white;
            border-radius: 50%; box-shadow: 0 0 15px #3b82f6;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.5); opacity: 0.5; }
            100% { transform: scale(1); opacity: 1; }
        }

        .leaflet-popup-content-wrapper { border-radius: 1.5rem; background: white; color: black; padding: 0; }
        .leaflet-container { background: #080808 !important; }
        
        .loading-screen {
            position: fixed; inset: 0; background: #080808; z-index: 100;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .chat-bubble {
            animation: slideIn 0.3s ease-out;
        }
        @keyframes slideIn {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        /* লোকেশন পিকারের জন্য স্টাইল */
        .location-picker-active {
            cursor: crosshair !important;
        }
        
        .center-pin {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1000;
            pointer-events: none;
            text-shadow: 0 0 20px rgba(16, 185, 129, 0.8);
        }

        .temp-marker {
            background: transparent;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script>
        // ডেমো ডাটা
        window.DEMO_MODE = true;
        window.DEMO_SPOTS = [
            {
                id: '1',
                name: 'ধানমণ্ডি কেন্দ্রীয় মসজিদ',
                type: 'Biriyani',
                count: '১০০',
                time: '১৮:৩০',
                description: 'আজকের ইফতারে বিশেষ বিরিয়ানি',
                lat: 23.8103,
                lng: 90.4125,
                realVotes: 45,
                fakeVotes: 2,
                createdAt: Date.now()
            },
            {
                id: '2',
                name: 'বাইতুল মোকাররম',
                type: 'Khichuri',
                count: '২০০',
                time: '১৮:১৫',
                description: 'গরম গরম খিচুড়ি বিতরণ',
                lat: 23.7295,
                lng: 90.4115,
                realVotes: 78,
                fakeVotes: 5,
                createdAt: Date.now()
            },
            {
                id: '3',
                name: 'মোহাম্মদপুর কেন্দ্রীয় মসজিদ',
                type: 'Haleem',
                count: '১৫০',
                time: '১৮:৪৫',
                description: 'বিশেষ হালিম ইফতার',
                lat: 23.7603,
                lng: 90.3625,
                realVotes: 32,
                fakeVotes: 1,
                createdAt: Date.now()
            }
        ];
    </script>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const App = () => {
            const [user, setUser] = useState(null);
            const [activeSpots, setActiveSpots] = useState([]);
            const [isBottomSheetOpen, setIsBottomSheetOpen] = useState(false);
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [isAIChatOpen, setIsAIChatOpen] = useState(false);
            const [pickingLocation, setPickingLocation] = useState(false);
            const [isLoading, setIsLoading] = useState(true);
            const [searchQuery, setSearchQuery] = useState("");
            const [aiTip, setAiTip] = useState("✨ আজকের টিপস পেতে ক্লিক করুন!");
            const [selectedLocation, setSelectedLocation] = useState(null);
            const [tempMarker, setTempMarker] = useState(null);
            
            const [formData, setFormData] = useState({
                name: '', type: 'Biriyani', manualItem: '', count: '', time: '18:00', description: '', lat: 23.8103, lng: 90.4125
            });

            const mapRef = useRef(null);
            const mapInstance = useRef(null);
            const markersRef = useRef([]);
            const userMarkerRef = useRef(null);

            // ডেমো ডাটা লোড করা
            useEffect(() => {
                if (window.DEMO_MODE) {
                    setActiveSpots(window.DEMO_SPOTS);
                    setIsLoading(false);
                }
            }, []);

            // AI টিপস জেনারেট
            const getSmartTip = async () => {
                setIsAIChatOpen(true);
                const tips = [
                    "🍛 গরম গরম বিরিয়ানি দিয়ে ইফতার শুরু করুন!",
                    "🕌 মসজিদে আগে থেকে চলে আসুন, ভিড় এড়াতে",
                    "💝 প্রতিবেশীদের সাথে ইফতার শেয়ার করুন",
                    "🌙 মাগরিবের নামাজের পর ইফতার করুন",
                    "🥘 খেজুর দিয়ে ইফতার শুরু করা সুন্নত",
                    "🤝 ইফতার পার্টি আয়োজন করুন এলাকায়",
                    "⏰ সময়মত ইফতার বিতরণ নিশ্চিত করুন",
                    "🧹 পরিষ্কার-পরিচ্ছন্নতা বজায় রাখুন"
                ];
                const randomTip = tips[Math.floor(Math.random() * tips.length)];
                setTimeout(() => setAiTip(randomTip), 1000);
            };

            // ম্যাপ ইনিশিয়ালাইজ
            useEffect(() => {
                if (!mapRef.current || mapInstance.current) return;
                
                console.log("ম্যাপ ইনিশিয়ালাইজ হচ্ছে...");
                
                mapInstance.current = L.map(mapRef.current, { 
                    zoomControl: false, 
                    attributionControl: false 
                }).setView([23.8103, 90.4125], 13);
                
                L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(mapInstance.current);

                // ইউজার লোকেশন ট্র্যাক
                mapInstance.current.locate({ setView: false, watch: true, maxZoom: 16 });
                
                mapInstance.current.on('locationfound', (e) => {
                    console.log("লোকেশন পাওয়া গেছে:", e.latlng);
                    if (userMarkerRef.current) userMarkerRef.current.remove();
                    userMarkerRef.current = L.marker(e.latlng, {
                        icon: L.divIcon({ className: 'user-marker', iconSize: [16, 16] })
                    }).addTo(mapInstance.current);
                });

                mapInstance.current.on('locationerror', (e) => {
                    console.log("লোকেশন এরর:", e);
                });

                setIsLoading(false);
            }, []);

            // লোকেশন পিকিং মোড
            useEffect(() => {
                if (!mapInstance.current) return;
                
                if (pickingLocation) {
                    console.log("লোকেশন পিকিং মোড চালু");
                    
                    // আগের টেম্প মার্কার সরান
                    if (tempMarker) {
                        mapInstance.current.removeLayer(tempMarker);
                        setTempMarker(null);
                    }
                    
                    setSelectedLocation(null);
                    
                    // ম্যাপের ক্লিক ইভেন্ট হ্যান্ডলার
                    const handleMapClick = (e) => {
                        console.log("ম্যাপে ক্লিক করা হয়েছে:", e.latlng);
                        
                        // আগের টেম্প মার্কার সরান
                        if (tempMarker) {
                            mapInstance.current.removeLayer(tempMarker);
                        }
                        
                        // নতুন টেম্প মার্কার তৈরি
                        const newMarker = L.marker(e.latlng, {
                            icon: L.divIcon({
                                className: 'temp-marker',
                                html: '<div style="width: 24px; height: 24px; background: #10b981; border: 4px solid white; border-radius: 50%; box-shadow: 0 0 30px #10b981; animation: ping 1s infinite;"></div>',
                                iconSize: [24, 24]
                            })
                        }).addTo(mapInstance.current);
                        
                        setTempMarker(newMarker);
                        setSelectedLocation(e.latlng);
                        
                        // ফর্ম ডাটা আপডেট
                        setFormData(prev => ({ 
                            ...prev, 
                            lat: e.latlng.lat, 
                            lng: e.latlng.lng 
                        }));
                    };
                    
                    mapInstance.current.on('click', handleMapClick);
                    
                    // ক্লিনআপ ফাংশন
                    return () => {
                        mapInstance.current.off('click', handleMapClick);
                        if (tempMarker) {
                            mapInstance.current.removeLayer(tempMarker);
                        }
                    };
                }
            }, [pickingLocation]);

            // মার্কার রেন্ডার
            useEffect(() => {
                if (!mapInstance.current) return;
                
                console.log("মার্কার রেন্ডার হচ্ছে:", activeSpots.length);
                
                markersRef.current.forEach(m => m.remove());
                markersRef.current = [];

                activeSpots.forEach(spot => {
                    const marker = L.marker([spot.lat, spot.lng], {
                        icon: L.divIcon({
                            className: 'custom-marker',
                            html: `
                                <div class="flex flex-col items-center">
                                    <div class="mosjid-marker-pin">
                                        <svg viewBox="0 0 24 24" fill="white" style="width:24px;height:24px;">
                                            <path d="M12 2L4.5 11V22H19.5V11L12 2M12 4.44L17.5 11H6.5L12 4.44M11 20H8V13H11V20M16 20H13V13H16V20Z"/>
                                        </svg>
                                    </div>
                                    <div class="bg-black/90 text-white text-[10px] px-2 py-0.5 rounded border border-white/20 mt-1 whitespace-nowrap">${spot.name?.split(' ')[0] || 'মসজিদ'}</div>
                                </div>
                            `,
                            iconSize: [44, 60],
                            iconAnchor: [22, 50]
                        })
                    }).addTo(mapInstance.current);

                    marker.bindPopup(`
                        <div class="p-3 text-center font-sans text-black">
                            <b class="text-sm block mb-1 font-bold">${spot.name || 'মসজিদ'}</b>
                            <p class="text-[11px] italic mb-2">${spot.description || 'ইফতার বিতরণ'}</p>
                            <div class="text-xs font-black bg-emerald-100 text-emerald-700 py-1 rounded-lg mb-2">${spot.type || 'খাবার'} - ${spot.count || '০'} জন</div>
                            <div class="flex justify-center gap-2">
                                <span class="px-2 py-1 bg-emerald-50 rounded text-[10px]">👍 ${spot.realVotes || 0}</span>
                                <span class="px-2 py-1 bg-red-50 rounded text-[10px]">👎 ${spot.fakeVotes || 0}</span>
                            </div>
                        </div>
                    `);
                    
                    markersRef.current.push(marker);
                });
            }, [activeSpots]);

            // স্পট যোগ করার ফাংশন
            const addNewSpot = () => {
                console.log("addNewSpot কল করা হয়েছে");
                console.log("formData:", formData);
                console.log("selectedLocation:", selectedLocation);
                
                if (!formData.name) {
                    alert("মসজিদের নাম লিখুন!");
                    return;
                }
                
                if (!selectedLocation) {
                    alert("দয়া করে ম্যাপে একটি লোকেশন সিলেক্ট করুন!");
                    return;
                }
                
                const newSpot = {
                    id: Date.now().toString(),
                    name: formData.name,
                    type: formData.type === 'Other' ? formData.manualItem : formData.type,
                    count: formData.count || '০',
                    time: formData.time,
                    description: formData.description || 'ইফতার বিতরণ',
                    lat: selectedLocation.lat,
                    lng: selectedLocation.lng,
                    realVotes: 0,
                    fakeVotes: 0,
                    createdAt: Date.now()
                };
                
                console.log("নতুন স্পট যোগ করা হচ্ছে:", newSpot);
                
                setActiveSpots(prev => [...prev, newSpot]);
                
                // টেম্প মার্কার সরান
                if (tempMarker) {
                    mapInstance.current.removeLayer(tempMarker);
                    setTempMarker(null);
                }
                
                // সব স্টেট রিসেট
                setPickingLocation(false);
                setIsModalOpen(false);
                setSelectedLocation(null);
                
                setFormData({ 
                    name: '', 
                    type: 'Biriyani', 
                    manualItem: '', 
                    count: '', 
                    time: '18:00', 
                    description: '', 
                    lat: 23.8103, 
                    lng: 90.4125 
                });
                
                alert("✅ সফলভাবে স্পট যোগ করা হয়েছে!");
            };

            const filteredSpots = activeSpots.filter(s => 
                s.name?.toLowerCase().includes(searchQuery.toLowerCase()) || 
                (s.type && s.type.toLowerCase().includes(searchQuery.toLowerCase()))
            );

            return (
                <div className="h-screen w-screen flex flex-col bg-[#080808] relative overflow-hidden">
                    {isLoading && (
                        <div className="loading-screen">
                            <span className="text-8xl animate-bounce mb-8">🍛</span>
                            <p className="text-emerald-500 font-bold animate-pulse uppercase tracking-widest">লাইভ ম্যাপ লোড হচ্ছে...</p>
                        </div>
                    )}

                    {/* AI টিপস */}
                    {isAIChatOpen && (
                        <div className="fixed top-20 left-1/2 -translate-x-1/2 z-50 w-[90%] max-w-md p-4 bg-emerald-900/90 backdrop-blur-md rounded-2xl border border-emerald-500/30 shadow-2xl chat-bubble">
                            <div className="flex justify-between items-center mb-1">
                                <span className="text-[10px] font-black text-emerald-400 uppercase tracking-widest">✨ এআই সহায়ক</span>
                                <button onClick={() => setIsAIChatOpen(false)} className="text-white/50 hover:text-white">✕</button>
                            </div>
                            <p className="text-sm font-medium leading-relaxed">{aiTip}</p>
                        </div>
                    )}

                    {/* সার্চ বার */}
                    <header className={`p-4 z-20 transition-opacity duration-300 ${pickingLocation ? 'opacity-0 pointer-events-none' : 'opacity-100'}`}>
                        <div className="flex gap-2 bg-black/50 backdrop-blur-xl p-2 rounded-full border border-white/5 items-center shadow-2xl">
                            <div className="bg-emerald-500 w-10 h-10 rounded-full flex items-center justify-center shadow-lg text-xl">🍛</div>
                            <input 
                                className="flex-1 bg-transparent outline-none text-sm px-2 font-bold text-white placeholder:text-gray-600" 
                                placeholder="খুঁজুন (মসজিদ/আইটেম)..."
                                value={searchQuery}
                                onChange={(e) => setSearchQuery(e.target.value)}
                            />
                            <button onClick={getSmartTip} className="bg-white/10 w-10 h-10 rounded-full flex items-center justify-center transition-colors hover:bg-white/20">✨</button>
                        </div>
                    </header>

                    {/* ম্যাপ এরিয়া */}
                    <div ref={mapRef} className="flex-1 relative z-10">
                        {pickingLocation && (
                            <>
                                {/* সেন্টার পিন - ক্লিক করার জন্য গাইড */}
                                <div className="center-pin">
                                    <div className="relative">
                                        <div className="w-8 h-8 bg-emerald-500 rounded-full animate-ping opacity-50 absolute"></div>
                                        <div className="w-8 h-8 bg-emerald-500 rounded-full flex items-center justify-center relative">
                                            <div className="w-3 h-3 bg-white rounded-full"></div>
                                        </div>
                                    </div>
                                    <p className="text-white text-xs mt-2 bg-black/50 px-2 py-1 rounded-full whitespace-nowrap">
                                        📍 মসজিদের位置上 ক্লিক করুন
                                    </p>
                                </div>
                                
                                {/* লোকেশন তথ্য এবং কনফার্ম বাটন */}
                                <div className="absolute bottom-10 left-0 right-0 flex flex-col gap-3 px-4 z-30">
                                    <div className="bg-black/90 backdrop-blur-md p-4 rounded-2xl border border-white/10 text-center shadow-2xl">
                                        <p className="text-[10px] text-gray-500 font-black uppercase mb-1 tracking-widest">
                                            {selectedLocation ? '✅ লোকেশন সিলেক্ট করা হয়েছে' : '👆 ম্যাপে ক্লিক করুন'}
                                        </p>
                                        {selectedLocation && (
                                            <div className="text-emerald-400 text-sm font-bold">
                                                {selectedLocation.lat.toFixed(6)}, {selectedLocation.lng.toFixed(6)}
                                            </div>
                                        )}
                                        <div className="mt-2 text-white font-bold">
                                            {formData.name || 'মসজিদের নাম'}
                                        </div>
                                    </div>
                                    
                                    <div className="flex gap-2">
                                        <button 
                                            onClick={addNewSpot}
                                            disabled={!selectedLocation}
                                            className={`flex-1 py-4 rounded-xl font-bold text-white transition-all ${
                                                selectedLocation 
                                                    ? 'bg-emerald-600 active:scale-95 shadow-lg shadow-emerald-900/40' 
                                                    : 'bg-gray-600 opacity-50 cursor-not-allowed'
                                            }`}
                                        >
                                            {selectedLocation ? '✅ কনফার্ম' : '⏳ সিলেক্ট করুন'}
                                        </button>
                                        
                                        <button 
                                            onClick={() => { 
                                                setPickingLocation(false); 
                                                setIsModalOpen(true);
                                                if (tempMarker) {
                                                    mapInstance.current.removeLayer(tempMarker);
                                                    setTempMarker(null);
                                                }
                                                setSelectedLocation(null);
                                            }} 
                                            className="px-6 py-4 bg-red-600/20 border border-red-600/30 rounded-xl text-white font-bold"
                                        >
                                            ✕
                                        </button>
                                    </div>
                                </div>
                            </>
                        )}
                    </div>

                    {/* অ্যাকশন বাটন */}
                    <div className={`fixed bottom-28 right-6 z-20 flex flex-col gap-4 ${pickingLocation ? 'hidden' : 'flex'}`}>
                        <button className="w-14 h-14 bg-white/5 backdrop-blur-md border border-white/10 rounded-full flex items-center justify-center shadow-xl active:scale-90 transition-all" onClick={() => mapInstance.current?.locate({ setView: true })}>
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#10b981" strokeWidth="3"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/></svg>
                        </button>
                        <button className="w-16 h-16 bg-orange-600 rounded-full flex items-center justify-center shadow-[0_10px_30px_rgba(234,88,12,0.4)] text-4xl font-bold active:scale-90 transition-all hover:rotate-90" onClick={() => setIsModalOpen(true)}>+</button>
                    </div>

                    {/* নিচের লিস্ট */}
                    <div className={`fixed inset-x-0 bottom-0 z-40 bg-[#0c0c0c] border-t border-white/5 rounded-t-[2.5rem] transition-all duration-500 ease-out flex flex-col shadow-[0_-10px_40px_rgba(0,0,0,1)] ${isBottomSheetOpen ? 'h-[75vh]' : 'h-24'} ${pickingLocation ? 'translate-y-full' : ''}`}>
                        <div onClick={() => setIsBottomSheetOpen(!isBottomSheetOpen)} className="w-full flex flex-col items-center py-4 cursor-pointer active:bg-white/5">
                            <div className="w-10 h-1 bg-white/20 rounded-full mb-3"></div>
                            <div className="flex justify-between w-full px-8 items-center">
                                <div className="flex items-center gap-2">
                                    <span className="font-black text-emerald-500 text-sm uppercase tracking-wider">কাছের ডিস্ট্রিবিউশন</span>
                                    <span className="bg-emerald-900/50 text-emerald-400 text-[10px] px-2 py-0.5 rounded-full font-bold">{filteredSpots.length} টা</span>
                                </div>
                                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" className={`transition-transform duration-300 ${isBottomSheetOpen ? 'rotate-180' : ''}`}><path d="m18 15-6-6-6 6"/></svg>
                            </div>
                        </div>
                        <div className="flex-1 overflow-y-auto px-6 pb-10 hide-scrollbar">
                            {filteredSpots.length === 0 ? (
                                <div className="text-center py-20 opacity-20 font-bold">কোনো স্পট পাওয়া যায়নি</div>
                            ) : (
                                <div className="space-y-3">
                                    {filteredSpots.map(spot => (
                                        <div key={spot.id} onClick={() => { mapInstance.current?.flyTo([spot.lat, spot.lng], 17); setIsBottomSheetOpen(false); }} className="bg-white/5 p-4 rounded-[2rem] border border-white/5 flex gap-4 items-center active:bg-white/10 transition-all cursor-pointer">
                                            <div className="w-12 h-12 bg-emerald-500/10 rounded-2xl flex items-center justify-center text-2xl shrink-0">🕌</div>
                                            <div className="flex-1 min-w-0">
                                                <div className="flex justify-between items-center mb-1">
                                                    <h4 className="font-bold text-white truncate text-base tracking-tight">{spot.name}</h4>
                                                    <span className="text-[10px] font-black text-emerald-400 uppercase bg-emerald-500/10 px-2 py-0.5 rounded-md">{spot.type}</span>
                                                </div>
                                                <div className="flex justify-between items-center text-[11px] text-gray-500 font-bold uppercase tracking-widest">
                                                    <span>{spot.count} জন • {spot.time}</span>
                                                    <div className="flex gap-2">
                                                        <span className="text-emerald-400">👍 {spot.realVotes || 0}</span>
                                                        <span className="text-red-400">👎 {spot.fakeVotes || 0}</span>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>
                    </div>

                    {/* স্পট ইনফো মোডাল */}
                    {isModalOpen && (
                        <div className="fixed inset-0 z-50 bg-black/95 flex items-center justify-center p-6 backdrop-blur-lg animate-in fade-in duration-300">
                            <div className="bg-[#121212] w-full max-w-sm p-8 rounded-[3.5rem] border border-white/5 shadow-2xl relative">
                                <button className="absolute top-8 right-8 text-gray-500 text-2xl hover:text-white" onClick={() => setIsModalOpen(false)}>✕</button>
                                <h3 className="text-2xl font-black mb-8 tracking-tighter text-white">ডিস্ট্রিবিউশন তথ্য</h3>
                                <div className="space-y-4">
                                    <div className="space-y-1">
                                        <label className="text-[10px] font-black text-gray-600 uppercase ml-3">মসজিদের নাম *</label>
                                        <input 
                                            className="w-full bg-black p-4 rounded-2xl border border-white/5 outline-none font-bold text-white placeholder:text-gray-700 focus:ring-1 focus:ring-emerald-500/30 transition-all" 
                                            placeholder="যেমন: ধানমণ্ডি কেন্দ্রীয় মসজিদ" 
                                            value={formData.name} 
                                            onChange={(e) => setFormData({...formData, name: e.target.value})} 
                                        />
                                    </div>
                                    <div className="grid grid-cols-2 gap-3">
                                        <div className="space-y-1">
                                            <label className="text-[10px] font-black text-gray-600 uppercase ml-3">মেনু</label>
                                            <select className="w-full bg-black p-4 rounded-2xl outline-none border border-white/5 text-white font-bold appearance-none" value={formData.type} onChange={(e) => setFormData({...formData, type: e.target.value})}>
                                                <option value="Biriyani">বিরিয়ানি</option>
                                                <option value="Khichuri">খিচুড়ি</option>
                                                <option value="Haleem">হালিম</option>
                                                <option value="Other">অন্যান্য</option>
                                            </select>
                                        </div>
                                        <div className="space-y-1">
                                            <label className="text-[10px] font-black text-gray-600 uppercase ml-3">পরিমাণ</label>
                                            <input type="text" placeholder="১০০" className="w-full bg-black p-4 rounded-2xl outline-none border border-white/5 text-white font-bold" value={formData.count} onChange={(e) => setFormData({...formData, count: e.target.value})} />
                                        </div>
                                    </div>
                                    {formData.type === 'Other' && (
                                        <input className="w-full bg-emerald-900/20 p-4 rounded-2xl border border-emerald-500/20 outline-none font-black text-emerald-400" placeholder="আইটেমের নাম লিখুন" value={formData.manualItem} onChange={(e) => setFormData({...formData, manualItem: e.target.value})} />
                                    )}
                                    <div className="space-y-1">
                                        <label className="text-[10px] font-black text-gray-600 uppercase ml-3">আমন্ত্রণ</label>
                                        <input className="w-full bg-black p-4 rounded-2xl border border-white/5 outline-none font-bold text-white placeholder:text-gray-700" placeholder="আমন্ত্রণ লিখুন..." value={formData.description} onChange={(e) => setFormData({...formData, description: e.target.value})} />
                                    </div>
                                    <div className="flex items-center gap-3 bg-black p-1 rounded-2xl border border-white/5">
                                        <label className="text-[10px] text-gray-500 font-black uppercase ml-3 shrink-0">সময়:</label>
                                        <input type="time" className="flex-1 bg-transparent p-4 rounded-xl outline-none text-white font-bold" value={formData.time} onChange={(e) => setFormData({...formData, time: e.target.value})} />
                                    </div>
                                </div>
                                <button 
                                    className="w-full bg-emerald-600 py-6 rounded-full font-black text-lg mt-10 active:scale-95 transition-all shadow-xl shadow-emerald-900/40 hover:bg-emerald-500" 
                                    onClick={() => { 
                                        if(!formData.name) {
                                            alert("মসজিদের নাম লিখুন!");
                                            return;
                                        }
                                        setIsModalOpen(false); 
                                        setPickingLocation(true);
                                    }}
                                >
                                    🗺️ ম্যাপে লোকেশন সিলেক্ট করুন
                                </button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
